<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Acceso Privado - Streaming Quilla</title>
  <link rel="icon" href="logo de streaming Quilla.jpeg" type="image/jpeg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet" />

  <style>
    :root {
      --bg-main: #060913;
      --bg-secondary: #0e1528;
      --card-bg: rgba(15, 21, 40, 0.82);
      --border: rgba(255, 255, 255, 0.09);
      --text-main: #f8faff;
      --text-soft: #98a4c4;
      --primary: #7c5cff;
      --primary-2: #00d4ff;
      --danger: #ff5f6d;
      --radius-xl: 24px;
      --radius-md: 14px;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      --transition: 0.3s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", "Inter", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(124, 92, 255, 0.22), transparent 26%),
        radial-gradient(circle at bottom right, rgba(0, 212, 255, 0.15), transparent 24%),
        linear-gradient(135deg, var(--bg-main), var(--bg-secondary) 50%, #131c38);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    .background-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 20%, rgba(124, 92, 255, 0.14), transparent 20%),
        radial-gradient(circle at 80% 30%, rgba(0, 212, 255, 0.1), transparent 20%),
        radial-gradient(circle at 50% 80%, rgba(37, 211, 102, 0.06), transparent 18%);
      filter: blur(24px);
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      position: relative;
      background: var(--card-bg);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
      padding: 30px 24px;
      z-index: 1;
    }

    .auth-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(
        135deg,
        rgba(124, 92, 255, 0.55),
        rgba(0, 212, 255, 0.24),
        rgba(255, 255, 255, 0.06)
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .brand-logo {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      margin-bottom: 14px;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      margin-bottom: 12px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 8px 22px rgba(124, 92, 255, 0.3);
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .subtext {
      color: var(--text-soft);
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 16px;
    }

    label {
      font-size: 0.94rem;
      font-weight: 600;
      color: #eaf0ff;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      outline: none;
      transition: var(--transition);
      font-size: 0.96rem;
    }

    input::placeholder {
      color: #7f8cae;
    }

    input:focus {
      border-color: rgba(124, 92, 255, 0.8);
      box-shadow: 0 0 0 4px rgba(124, 92, 255, 0.16);
      transform: translateY(-1px);
    }

    .submit-btn {
      width: 100%;
      margin-top: 18px;
      border: none;
      padding: 16px 18px;
      border-radius: 16px;
      font-size: 0.97rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      background: linear-gradient(135deg, #25d366, #18b954);
      color: #fff;
      box-shadow: 0 14px 30px rgba(37, 211, 102, 0.28);
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 35px rgba(37, 211, 102, 0.36);
    }

    .error {
      margin-top: 14px;
      min-height: 22px;
      text-align: center;
      color: var(--danger);
      font-weight: 700;
      font-size: 0.93rem;
    }

    .hint {
      margin-top: 10px;
      text-align: center;
      color: var(--text-soft);
      font-size: 0.82rem;
    }

    @media (max-width: 768px) {
      .auth-card {
        padding: 24px 16px;
      }

      h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="background-glow"></div>

  <div class="auth-card">
    <div class="auth-header">
      <img src="logo de streaming Quilla.jpeg" alt="Logo Streaming Quilla" class="brand-logo" />
      <span class="badge">🔐 Acceso privado</span>
      <h1>Streaming Quilla</h1>
      <p class="subtext">Ingresa tu usuario y contraseña para desbloquear el panel cifrado.</p>
    </div>

    <form id="unlockForm">
      <div class="form-group">
        <label for="username">👤 Usuario</label>
        <input type="text" id="username" placeholder="Tu usuario privado" required />
      </div>

      <div class="form-group">
        <label for="password">🔑 Contraseña</label>
        <input type="password" id="password" placeholder="Tu contraseña privada" required />
      </div>

      <button type="submit" class="submit-btn">Entrar al panel</button>
      <div class="error" id="errorMsg"></div>
      <div class="hint">El contenido real se descifra solo si las credenciales son correctas.</div>
    </form>
  </div>

  <script src="decrypt.js"></script>
</body>
</html>
